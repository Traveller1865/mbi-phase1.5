name: MBI
options:
  bundleIdPrefix: com.chronos.mbi
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""
targets:
  MBI:
    type: application
    platform: iOS
    sources:
      - path: MBI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chronos.mbi.MBI
        INFOPLIST_FILE: MBI/Info.plist
    entitlements:
      path: MBI/MBI.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
